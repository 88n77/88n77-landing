    const NAV_I18N = { "Софти":"Soft", "Боти":"Bots", "Замовити":"Order", "Як це працює":"How it works" };
    const navNodes = [];
    ['header','footer'].forEach(sel => {
      const el = document.querySelector(sel); if (!el) return;
      const w = document.createTreeWalker(el, NodeFilter.SHOW_TEXT); let n;
      while (n = w.nextNode()) { const tr = n.nodeValue.trim(); if (tr && NAV_I18N[tr]) navNodes.push({ n, uk: n.nodeValue, en: n.nodeValue.replace(tr, NAV_I18N[tr]) }); }
    });

    // ===== Рендер =====
    const esc = (v) => String(v).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

    const base = SOFTS[id];
    const root2 = document.getElementById('softContent');

    function render(lang) {
      const t = L[lang];
      if (!base) {
        root2.innerHTML = `<div class="text-center py-20"><h1 class="font-display font-bold text-3xl">${t.notFound}</h1><a href="index.html#soft" class="mt-6 inline-flex items-center gap-2 text-brand-orange font-semibold"><i class="ti ti-arrow-left"></i> ${t.backList}</a></div>`;
        return;
      }
      const s = (lang === 'en' && SOFTS_EN[id]) ? Object.assign({}, base, SOFTS_EN[id]) : base;
      const st = STATUS[s.status] || STATUS.working;
      const platforms = s.platforms || ['windows','mac','linux'];
      const featuresText = Array.isArray(s.features) ? s.features.join('\n') : (s.features || '');
      document.title = `88n77 — ${s.name}`;
      root2.innerHTML = `
        <a href="index.html#soft" class="inline-flex items-center gap-2 text-sm text-zinc-500 hover:text-brand-orange transition mb-6">
          <i class="ti ti-arrow-left"></i> ${t.allSoft}
        </a>

        <div class="relative rounded-xl overflow-hidden border border-zinc-200 dark:border-zinc-800 aspect-[3/1]">
          ${s.banner
            ? `<img src="${esc(s.banner)}" alt="${esc(s.name)}" class="absolute inset-0 w-full h-full object-cover"><div class="absolute inset-0 pointer-events-none dark:bg-[radial-gradient(125%_125%_at_50%_42%,transparent_46%,rgba(10,10,10,0.92)_100%)]"></div>`

              <h1 class="font-display font-extrabold text-4xl md:text-5xl tracking-tight">${esc(s.name)}</h1>

            </div>
            <div class="flex flex-wrap gap-2">${s.tags.map(x=>`<span class="chip-tag">${esc(x)}</span>`).join('')}</div>
          </div>
          ${s.tagline ? `<p class="mt-2 text-zinc-500">${esc(s.tagline)}</p>` : ''}
        </div>

        <div class="mt-6 flex flex-wrap items-center gap-3">
          <span class="text-sm text-zinc-500">${t.supported}</span>

        <section class="mt-12">
          <h2 class="font-display font-bold text-2xl md:text-3xl mb-6">${t.about}</h2>

        <section class="mt-12">
          <h2 class="font-display font-bold text-2xl md:text-3xl ${s.note ? 'mb-2' : 'mb-6'}">${t.features}</h2>
          ${s.note ? `<p class="mb-6 inline-flex items-center gap-2 text-sm font-semibold text-brand-orange"><i class="ti ti-info-circle"></i> ${esc(s.note)}</p>` : ''}
          ${s.video
            ? `<video src="${esc(s.video)}" autoplay muted loop playsinline preload="metadata" poster="${esc(s.banner)}" class="rounded-xl border border-zinc-200 dark:border-zinc-800 mb-6 w-full max-w-2xl mx-auto block"></video>`
            : s.shot ? `<img src="${esc(s.shot)}" alt="${esc(s.name)} ${t.iface}" class="rounded-xl border border-zinc-200 dark:border-zinc-800 mb-6 w-full max-w-2xl mx-auto block">` : ''}
          ${Array.isArray(s.features)
            ? `<div class="grid sm:grid-cols-2 gap-3">${s.features.map(f=>`<div class="feat-shimmer flex items-center gap-3 rounded-lg border border-zinc-200 dark:border-zinc-800 bg-zinc-50 dark:bg-zinc-900/40 px-4 py-3.5 transition hover:border-brand-orange hover:bg-brand-orange/5"><span class="relative z-10 grid place-items-center w-7 h-7 rounded-md bg-brand-orange/15 text-brand-orange shrink-0"><i class="ti ti-check text-base"></i></span><span class="relative z-10 text-sm font-medium text-zinc-800 dark:text-zinc-100">${esc(f)}</span></div>`).join('')}</div>`

        </section>

        <section class="mt-12 rounded-xl border border-zinc-200 dark:border-zinc-800 bg-gradient-to-br from-brand-orange/10 to-transparent p-8 md:p-12 text-center">

            <i class="ti ti-brand-telegram text-xl"></i> ${t.tgBtn}
          </a>
        </section>
      `;
    }

    function applyLang(lang) {
      document.documentElement.lang = (lang === 'en' ? 'en' : 'uk');
      navNodes.forEach(o => { o.n.nodeValue = (lang === 'en' ? o.en : o.uk); });
      const lt = document.getElementById('langToggle');
      if (lt) lt.textContent = (lang === 'en' ? 'UA' : 'EN');
      localStorage.setItem('lang', lang);
      render(lang);
    }
    document.getElementById('langToggle')?.addEventListener('click', () => {
      applyLang(document.documentElement.lang === 'en' ? 'uk' : 'en');
    });
    applyLang(localStorage.getItem('lang') || 'uk');
  </script>
